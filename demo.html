<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOSMOS2 Demo</title>

  <!-- Wavesurfer.js CDN -->
  <script src="https://unpkg.com/wavesurfer.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #111;
      color: #eee;
      line-height: 1.6;
    }

    /* 背景動画 */
    #bgvideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    header {
      padding: 40px 20px;
      text-align: center;
      background: rgba(0,0,0,0.5);
    }

    h1 {
      margin: 0;
      font-size: 2.4rem;
      letter-spacing: 2px;
    }

    .section {
      padding: 40px 20px;
      max-width: 900px;
      margin: auto;
      background: rgba(0,0,0,0.5);
      border-radius: 12px;
      margin-top: 40px;
    }

    iframe {
      width: 100%;
      height: 360px;
      border: none;
      border-radius: 8px;
    }

    #waveform {
      width: 100%;
      height: 128px;
      margin-top: 20px;
      background: rgba(0,0,0,0.4);
      border-radius: 8px;
    }

    .audio-controls {
      margin-top: 10px;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      background: #444;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #666;
    }
  </style>
</head>

<body>

<!-- ★ 背景動画（最背面） -->
<video id="bgvideo" autoplay muted loop playsinline webkit-playsinline preload="auto">
  <source src="bgmv4.mp4" type="video/mp4">
</video>

<header>
  <h1>KOSMOS2 Demo</h1>
</header>

<section class="section">
  <h2>YouTube Demo</h2>
  <iframe
    src="https://www.youtube.com/embed/2WfGMvcNGGk"
    allowfullscreen>
  </iframe>
</section>

<section class="section">
  <h2>Audio Demo</h2>

  <div id="waveform"></div>

  <div class="audio-controls">
    <button id="play">Play</button>
    <button id="pause">Pause</button>
  </div>

  <audio id="audio" src="demo.mp3"></audio>
</section>

<script>
  const audio = document.getElementById("audio");

  const wavesurfer = WaveSurfer.create({
    container: "#waveform",
    waveColor: "#4fc3f7",
    progressColor: "#0288d1",
    height: 128,
    responsive: true,
    barWidth: 2,
    cursorWidth: 1,
    backend: "MediaElement",
    mediaControls: false,
    media: audio
  });

  document.getElementById("play").onclick = () => wavesurfer.play();
  document.getElementById("pause").onclick = () => wavesurfer.pause();
</script>

</body>
</html>
