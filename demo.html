<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KOSMOS2 Demo</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
  }

  /* 左上の横長プレビュー動画 */
  #preview-video {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 240px;
    height: 135px; /* 16:9 */
    object-fit: cover;
    border-radius: 12px;
    opacity: 0.9;
    z-index: 5;
  }

  /* メインコンテンツ（上に詰める） */
  .overlay {
    position: relative;
    z-index: 10;
    text-align: center;
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    padding-top: 140px; /* ← 200px → 140px に変更して上へ */
  }

  /* Shorts を高さ600pxに収める */
  .yt-fixed {
    width: 338px;
    height: 600px;
    margin: 0 auto;
    margin-top: -10px; /* ← 少し上に詰める */
    border-radius: 12px;
    overflow: hidden;
  }

  .yt-fixed iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* 波形（上に詰める） */
  #waveform {
    width: 90%;
    max-width: 600px;
    height: 128px;
    margin: 20px auto 10px auto; /* ← 上の余白を30px→20pxに */
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
  }

  .audio-controls {
    margin-bottom: 40px;
  }

  button {
    padding: 10px 20px;
    margin: 5px;
    background: rgba(255,255,255,0.2);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover {
    background: rgba(255,255,255,0.35);
  }
</style>

<script src="https://unpkg.com/wavesurfer.js"></script>

</head>
<body>

<!-- 左上の横長プレビュー動画 -->
<video autoplay loop muted playsinline id="preview-video">
  <source src="bgmv4.mp4" type="video/mp4">
</video>

<div class="overlay">

  <!-- 高さ600pxに収めた Shorts -->
  <div class="yt-fixed">
    <iframe
      src="https://www.youtube.com/embed/FyKJ0lwDYQ4"
      allowfullscreen>
    </iframe>
  </div>

  <!-- 波形 -->
  <div id="waveform"></div>

  <div class="audio-controls">
    <button id="play">Play</button>
    <button id="pause">Pause</button>
  </div>

  <audio id="audio" src="demo.mp3"></audio>

</div>

<script>
  const audio = document.getElementById("audio");

  const wavesurfer = WaveSurfer.create({
    container: "#waveform",
    waveColor: "#4fc3f7",
    progressColor: "#0288d1",
    height: 128,
    responsive: true,
    barWidth: 2,
    cursorWidth: 1,
    backend: "MediaElement",
    mediaControls: false,
    media: audio
  });

  document.getElementById("play").onclick = () => wavesurfer.play();
  document.getElementById("pause").onclick = () => wavesurfer.pause();
</script>

</body>
</html>
