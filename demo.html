<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KOSMOS2 Demo</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #333;
    font-family: Arial, sans-serif;
    color: white;
  }

  /* 背景動画 */
  #bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  /* オーバーレイ（index.html と統一） */
  .overlay {
    position: relative;
    z-index: 10;
    text-align: center;
    width: 90%;
    max-width: 900px;
    margin: 0 auto;
    padding-top: 50px;
  }

  h1 {
    font-size: 4rem;
    font-weight: 900;
    margin-bottom: 20px;
    letter-spacing: 2px;
  }

  h2 {
    font-size: 2rem;
    margin-top: 40px;
    margin-bottom: 20px;
  }

  iframe {
    width: 100%;
    height: 360px;
    border: none;
    border-radius: 12px;
  }

  /* 波形表示 */
  #waveform {
    width: 100%;
    height: 128px;
    margin-top: 20px;
    background: rgba(0,0,0,0.4);
    border-radius: 12px;
  }

  .audio-controls {
    margin-top: 10px;
  }

  button {
    padding: 10px 20px;
    margin: 5px;
    background: rgba(255,255,255,0.2);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover {
    background: rgba(255,255,255,0.35);
  }
</style>

<!-- Wavesurfer.js -->
<script src="https://unpkg.com/wavesurfer.js"></script>

</head>
<body>

<!-- 背景動画 -->
<video autoplay loop muted playsinline id="bg-video">
  <source src="bgmv4.mp4" type="video/mp4">
</video>

<div class="overlay">
  <div class="yt-container">
    <iframe
      src="https://youtube.com/embed/shorts/FyKJ0lwDYQ4?feature=share"
      
      allowfullscreen>
    </iframe>
  </div>

<style>
.yt-container {
  position: relative;
  width: 90%;
  max-width: 400px;
  margin: 0 auto;
  padding-top: 56.25%; /* 9/16 = 0.5625 */
  z-index: 10;
}

.yt-container iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 12px;
}
</style>


  <div id="waveform"></div>

  <div class="audio-controls">
    <button id="play">Play</button>
    <button id="pause">Pause</button>
  </div>

  <audio id="audio" src="demo.mp3"></audio>

</div>

<script>
  const audio = document.getElementById("audio");

  const wavesurfer = WaveSurfer.create({
    container: "#waveform",
    waveColor: "#4fc3f7",
    progressColor: "#0288d1",
    height: 128,
    responsive: true,
    barWidth: 2,
    cursorWidth: 1,
    backend: "MediaElement",
    mediaControls: false,
    media: audio
  });

  document.getElementById("play").onclick = () => wavesurfer.play();
  document.getElementById("pause").onclick = () => wavesurfer.pause();
</script>

</body>
</html>
