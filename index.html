<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KOSMOS2-SITE</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #333; /* 真っ黒ではなくグレーにして、動画がないことを判別しやすくする */
  }

  #bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0; /* 一旦 0 にして最前面に持ってくる */
  }

  .overlay {
    position: relative; /* absoluteから変更して、動画の下に表示されるか確認 */
    z-index: 10;
    color: white;
    text-align: center;
    padding-top: 50px;
  }
</style>

<body>
  <video autoplay loop muted playsinline id="bg-video">
    <source src="https://plantssystem.github.io/KOSMOS2-SITE/bgmv4.mp4" type="video/mp4">
    <!-- 万が一読み込めなかった時のために、サンプルを2番目に置いておくと真っ暗になりません -->
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
  </video>
  
  <div class="overlay">
    <h1>KOSMOS2</h1>
  </div>
</body>
</html>
