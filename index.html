<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KOSMOS2-SITE</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: black;
    font-family: sans-serif;
  }

  /* 背景動画（fixed が最も安定） */
  video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
    background: black;
  }

  /* テキストレイヤー */
  .overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: white;
    width: 90%;
    max-width: 800px;
  }

  .title {
    font-size: 3rem;
    font-weight: bold;
    margin-bottom: 20px;
    text-shadow: 0 0 20px rgba(0,0,0,0.7);
  }

  .desc {
    font-size: 1.3rem;
    line-height: 1.6;
    text-shadow: 0 0 15px rgba(0,0,0,0.7);
  }
</style>
</head>
<body>

  <video autoplay muted loop playsinline webkit-playsinline preload="auto">
    <source src="bgmv2.mp4" type="video/mp4">
  </video>

  <div class="overlay">
    <div class="title">KOSMOS2</div>
    <div class="desc">
      KOSMOS2 is a generative sound engine designed for minimal, evolving patterns.
      It runs entirely on embedded hardware and creates autonomous musical structures
      through four interacting parts: Melody, Bass, Chord, and Sequence.
    </div>
  </div>

</body>
</html>
