<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KOSMOS2-SITE</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #333;
  }

  #bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  .overlay {
    position: relative;
    z-index: 10;
    color: white;
    text-align: center;
    padding-top: 50px;
    width: 90%;
    max-width: 900px;
    margin: 0 auto;
  }
</style>
</head>

<body>

  <!-- 背景動画 -->
  <video autoplay loop muted playsinline id="bg-video">
    <source src="https://plantssystem.github.io/KOSMOS2-SITE/bgmv4.mp4" type="video/mp4">
  </video>

  <!-- 画面全体クリックで GitHub へ -->
  <a href="https://github.com/plantssystem/KOSMOS2"
     style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:20;">
  </a>

  <!-- オーバーレイ（日本語版） -->
  <div class="overlay">
    <h1 style="font-size:4rem; font-weight:900; margin-bottom:20px; letter-spacing:2px;">
      KOSMOS2
    </h1>

    <p style="font-size:1.8rem; font-weight:300; line-height:1.7; max-width:900px; margin:0 auto 20px;">
      自律的に進化し続ける、ミニマルなジェネレーティブ音響エンジン。
    </p>

    <p style="font-size:1.6rem; font-weight:300; line-height:1.7; max-width:900px; margin:0 auto;">
      Melody / Bass / Chord / Sequence の4つのパートが  
      ゆっくりと、絶え間なく、音の構造を変化させていく。
    </p>
  </div>

</body>
</html>
